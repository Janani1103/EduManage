<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo">📚</span>
      <h1>Create Account</h1>
      <p>Join EduManage today</p>
    </div>
    @if (error) { <div class="alert alert-error">{{ error }}</div> }
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="form.name" name="name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" name="email" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" [(ngModel)]="form.phone" name="phone">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select [(ngModel)]="form.role" name="role">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="form.password" name="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Register' }}
      </button>
    </form>
    <p class="auth-footer">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
