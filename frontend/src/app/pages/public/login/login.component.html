<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo">📚</span>
      <h1>Welcome Back</h1>
      <p>Sign in to EduManage</p>
    </div>
    @if (error) { <div class="alert alert-error">{{ error }}</div> }
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a routerLink="/register">Register</a></p>
    <p class="demo-hint">Demo: admin&#64;edumanage.com / admin123</p>
  </div>
</div>
